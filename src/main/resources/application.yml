server:
  forward-headers-strategy: framework
  servlet:
    session:
      timeout: 168h # 1 week

spring:
  application:
    name: mywiki

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/mywiki
    username: ${DB_USERNAME:mywiki}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - profile
              - email

logging:
  file:
    name: ./logs/spring.log

management:
  endpoints:
    web:
      exposure:
        include: ["prometheus", "health"]
  metrics:
    tags:
      application: ${spring.application.name}

app:
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:3000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:mywiki-secret-key-must-be-at-least-256-bits-long-for-hmac}
    expiration: ${JWT_EXPIRATION:604800000} # 7 days
