server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://host-loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: mywiki-backend-local
    static_configs:
      - targets:
          - localhost
        labels:
          job: mywiki-backend-local
          __path__: /var/log/mywiki/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger_name
            trace_id: traceId
      - labels:
          level:
          logger:
          trace_id: